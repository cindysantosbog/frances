<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇫🇷 Aprenda Francês - A partir do A2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');

        :root {
            --primary: #002395;
            --secondary: #ED2939;
            --accent: #0055A4;
            --gold: #F0C040;
            --bg: #f8f9fc;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-light: #6b7280;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #e5e7eb;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, var(--primary) 100%);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,35,149,0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-icon {
            font-size: 2em;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 0.5em;
            font-weight: 300;
            opacity: 0.8;
            display: block;
            font-family: 'Inter', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-badge {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .streak-fire {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* PROGRESS BAR GLOBAL */
        .global-progress {
            background: rgba(0,0,0,0.2);
            height: 4px;
            width: 100%;
        }

        .global-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #ffd700, var(--gold));
            transition: width 0.8s ease;
            border-radius: 0 2px 2px 0;
        }

        /* NAVIGATION */
        .nav-tabs {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 0;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            padding: 10px 20px;
            border: none;
            background: var(--card);
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.3s;
            white-space: nowrap;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .nav-tab:hover {
            color: var(--primary);
            background: white;
        }

        .nav-tab.active {
            background: white;
            color: var(--primary);
            font-weight: 600;
            box-shadow: 0 -4px 12px rgba(0,35,149,0.1);
        }

        /* MAIN CONTENT */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .content-area {
            background: var(--card);
            border-radius: 0 12px 12px 12px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            min-height: 60vh;
        }

        /* DASHBOARD */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dash-card {
            background: linear-gradient(135deg, #f8f9ff, #fff);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .dash-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .dash-card h3 {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .dash-card .big-number {
            font-size: 2.5em;
            font-weight: 800;
            color: var(--primary);
        }

        .dash-card .sub-text {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* MODULE LIST */
        .module-section {
            margin-bottom: 30px;
        }

        .module-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .module-section .section-desc {
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .level-a2 { background: #dbeafe; color: #1d4ed8; }
        .level-b1 { background: #d1fae5; color: #065f46; }
        .level-b2 { background: #fef3c7; color: #92400e; }

        .lessons-grid {
            display: grid;
            gap: 12px;
        }

        .lesson-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lesson-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(0,85,164,0.1);
            transform: translateX(4px);
        }

        .lesson-card.completed {
            border-color: var(--success);
            background: #f0fdf4;
        }

        .lesson-card.current {
            border-color: var(--accent);
            background: #eff6ff;
            box-shadow: 0 4px 16px rgba(0,85,164,0.15);
        }

        .lesson-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .lesson-number {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1em;
            flex-shrink: 0;
            background: var(--border);
            color: var(--text-light);
        }

        .lesson-card.completed .lesson-number {
            background: var(--success);
            color: white;
        }

        .lesson-card.current .lesson-number {
            background: var(--accent);
            color: white;
            animation: pulse 2s infinite;
        }

        .lesson-info {
            flex: 1;
        }

        .lesson-info h4 {
            font-size: 1em;
            margin-bottom: 2px;
        }

        .lesson-info p {
            font-size: 0.85em;
            color: var(--text-light);
        }

        .lesson-status {
            font-size: 1.3em;
        }

        /* LESSON VIEW */
        .lesson-view {
            display: none;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: none;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            color: var(--text);
            transition: all 0.3s;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .lesson-progress {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lesson-progress-bar {
            width: 200px;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .lesson-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        .lesson-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .lesson-subtitle {
            color: var(--text-light);
            margin-bottom: 24px;
            font-size: 1.05em;
        }

        /* CONTENT SECTIONS */
        .content-block {
            margin-bottom: 30px;
            padding: 24px;
            background: #f8f9ff;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .content-block h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 1.15em;
        }

        .content-block p {
            margin-bottom: 10px;
            line-height: 1.8;
        }

        .french-text {
            font-style: italic;
            color: var(--accent);
            font-weight: 500;
        }

        .translation {
            color: var(--text-light);
            font-size: 0.9em;
        }

        .example-box {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid var(--border);
        }

        .example-box .fr {
            font-size: 1.1em;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .example-box .pt {
            color: var(--text-light);
            font-size: 0.9em;
        }

        .example-box .audio-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.9em;
            margin-right: 8px;
            transition: transform 0.2s;
        }

        .example-box .audio-btn:hover {
            transform: scale(1.1);
        }

        .grammar-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .grammar-table th {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
        }

        .grammar-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .grammar-table tr:nth-child(even) td {
            background: #f8f9ff;
        }

        .grammar-table .highlight {
            color: var(--secondary);
            font-weight: 600;
        }

        .tip-box {
            background: linear-gradient(135deg, #fef3c7, #fffbeb);
            border: 1px solid #f59e0b;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 16px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .tip-box .tip-icon {
